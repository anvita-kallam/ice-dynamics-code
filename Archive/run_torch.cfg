# VI + PINN config — production more_sliding spin-up ground truth
# Run from Archive/:  python pretrain_solution_torch.py run_torch.cfg
#                      python train_torch.py run_torch.cfg
#                      python predict_torch.py run_torch.cfg
#
# Recommended η-focused joint training (fresh start from Stage-1 pretrain):
#   - freeze mean_net for the first 400 epochs
#   - stronger physics (phys_scale + tight ssa_*_std) so |r|~0.01 is not under the NLL floor
#   - higher vgp_eta LR than mean_net; ice-FPS inducing grid denser than 20×20
#   - soft state regularization toward pretrained PINN outputs
#   - disable unused λ KL under SSA
# Changing num_inducing_* / inducing_placement requires restore=False (VGP shape change).

[runtime]
dtype = 'float64'

[data]
# Production more_sliding _grid.npz (includes cfg_json with C and A).
h5file = '../outputs/spinup/production/more_sliding/SteadyState_more_sliding_10500yr_ramp4000_1refine_grid.npz'
default_u_err = 3.0
default_v_err = 3.0
default_s_err = 5.0
default_b_err = 5.0
s2y = 3600*24*365.25

[prior]
# η prior in MPa·yr (median ~12 on this case); C and A load from cfg_json at read time.
eta_init = 12.0
eta_min = 1.0e-3
eta_max = 1.0e6
l_scale_eta = 10.0e3
std_eta = 2.0
l_scale_lambda = 10.0e3
std_lambda = 1.0
lambda_init = 0.5
kl_eta = 0.05
# λ is unused in SSA physics — keep KL off so it does not dilute the ELBO.
kl_lambda = 0.0
# 28×28 = 784 ice-masked inducing points (was 20×20 bbox grid).
num_inducing_x = 28
num_inducing_y = 28
inducing_placement = 'ice_fps'
thickness_min = 1.0
speed_epsilon = 1.0
year = 3600*24*365.25
glen_exponent = 3.0
weertman_exponent = 3.0
strain_rate_min = 1.0e-5
# Fallbacks only — overridden by cfg_json (C=0.001, A=20 for more_sliding).
fluidity_A = 3.985e-13 * 3600*24*365.25 * 1.0e18
friction_C = 0.001
ssa_enforce_continuity = False
ssa_use_inferred_eta = True

[likelihood]
rx_std = 5.0
ry_std = 5.0
rH_std = 5.0
# Residual scale matched to observed |r_ux|,|r_vy|~1e-2 so NLL is not stuck at the Gaussian constant.
ssa_rx_std = 0.05
ssa_ry_std = 0.05
ssa_rh_std = 0.05
trainable_obs_variance = False

[train]
physics_approximation = 'SSA'
lr = 0.0002
# Prefer updating η over retuning the PINN state.
mean_net_lr = 1.0e-5
vgp_eta_lr = 2.0e-3
vgp_lambda_lr = 1.0e-5
# Freeze mean_net while epoch < 400 (absolute; survives Slurm requeue mid-freeze).
freeze_mean_net_epochs = 400
freeze_mean_net_fraction = 0.4
freeze_from_run_start = False
# Fresh start required after inducing-grid / physics-scale recipe change.
restore = False
restore_optimizer = False
n_epochs = 1000
batch_size = 2048
physics_batch_size = 512
data_scale = 1.0
phys_scale = 5.0
# Keep (u,v,s,H) near the pretrained PINN while η absorbs PDE mismatch.
state_reg_scale = 1.0
lr_scheduler = 'cosine'
eta_eval_every = 10
grad_eta_warn_ratio = 100.0
meannet_checkdir = 'checkpoints/torch_pretrain/more_sliding'
checkdir = 'checkpoints/torch_joint/more_sliding'
logfile = 'logs/log_train_torch_more_sliding'
plot_every = 25
optimizer = 'adam'
quadrature_size = 2
test_every = 1
meannet_checkname = 'model_best'
checkname_old = 'model'
checkname_new = 'model'
require_pretrain_checkpoint = True
verify_pretrain_load = True

[pretrain]
lr = 0.0002
restore = False
n_epochs = 1000
batch_size = 2048
checkdir = 'checkpoints/torch_pretrain/more_sliding'
logfile = 'logs/log_pretrain_torch_more_sliding'
plot_every = 25
resnet = True
optimizer = 'adam'
test_every = 1
checkname = 'model'

[predict]
batch_size = 8192
num_samples = 200
output_file = 'outputs/more_sliding_posterior_samples_torch.h5'

[torch]
backend = 'gloo'
device = 'auto'
num_workers = 0
pin_memory = False
train_drop_last = True
