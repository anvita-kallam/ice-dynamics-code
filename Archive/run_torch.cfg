# VI + PINN config — production more_sliding spin-up ground truth
# Fresh spatial-η run tuned for ~2–3×12h DSI wall allocations.
#
# Strategy:
#   - short freeze (~180): capture early spatial r peak, avoid late-freeze flatten
#   - split Adam optimizers (no L-BFGS — too slow for wall budget)
#   - after unfreeze: 1 VGP step + 1 PINN step (fast alternating)
#   - weaker η prior / KL + stronger physics for spatial structure
#   - n_epochs=700 (not 1000) so throughput fits ~2–3 walls
#
# Before submit:
#   mv checkpoints/torch_joint/more_sliding checkpoints/torch_joint/more_sliding_longfreeze_r0
#   sbatch slurm/vi_train_more_sliding.sbatch

[runtime]
dtype = 'float64'

[data]
h5file = '../outputs/spinup/production/more_sliding/SteadyState_more_sliding_10500yr_ramp4000_1refine_grid.npz'
default_u_err = 3.0
default_v_err = 3.0
default_s_err = 5.0
default_b_err = 5.0
s2y = 3600*24*365.25

[prior]
eta_init = 12.0
eta_min = 1.0
eta_max = 1.0e6
l_scale_eta = 10.0e3
std_eta = 2.0
l_scale_lambda = 10.0e3
std_lambda = 1.0
lambda_init = 0.5
# Mild inducing KL — strong KL flattened spatial η in the long freeze.
kl_eta = 0.15
kl_lambda = 0.0
# 24×24: spatial capacity vs KL cost (28×28 was slower; 20×20 was flat-prone).
num_inducing_x = 24
num_inducing_y = 24
inducing_placement = 'ice_fps'
thickness_min = 1.0
speed_epsilon = 1.0
year = 3600*24*365.25
glen_exponent = 3.0
weertman_exponent = 3.0
strain_rate_min = 1.0e-5
fluidity_A = 3.985e-13 * 3600*24*365.25 * 1.0e18
friction_C = 0.001
ssa_enforce_continuity = False
ssa_use_inferred_eta = True

[likelihood]
rx_std = 5.0
ry_std = 5.0
rH_std = 5.0
ssa_rx_std = 0.06
ssa_ry_std = 0.06
ssa_rh_std = 0.06
trainable_obs_variance = False

[train]
physics_approximation = 'SSA'
lr = 0.0002
# Quiet PINN after unfreeze; VGP owns spatial η.
mean_net_lr = 5.0e-6
vgp_eta_lr = 1.0e-3
vgp_lambda_lr = 1.0e-5
# Short freeze: spatial r peaked ~epoch 100–150 before long-freeze collapse.
freeze_mean_net_epochs = 180
freeze_mean_net_fraction = 0.26
freeze_from_run_start = False
# Resume wall-3+: pull mean η up (bias was ~−0.20 at r≈0.71); bump prior only.
restore = True
restore_optimizer = True
# From ckpt+1 toward 700 (set ≈ 700 − ckpt_epoch − 1 after wall kill).
n_epochs = 300
batch_size = 2048
physics_batch_size = 512
data_scale = 1.0
phys_scale = 4.0
state_reg_scale = 1.0
# Slightly stronger mean anchor (was 0.05); watch log10_r stay > ~0.5.
eta_prior_scale = 0.08
eta_prior_std = 1.5
lr_scheduler = 'cosine'
grad_eta_warn_ratio = 100.0
# Split Adam optimizers. L-BFGS disabled for wall-time budget.
optimizer = 'adam'
mean_net_optimizer = 'adam'
mean_net_optimizer_after_unfreeze = 'adam'
vgp_optimizer = 'adam'
# 1:1 after unfreeze (fast). Raise to 2–3 only if r stalls and time allows.
vgp_steps_per_mean_step = 1
mean_net_grad_clip = 1.0
vgp_grad_clip = 5.0
lbfgs_max_iter = 5
lbfgs_history_size = 10
meannet_checkdir = 'checkpoints/torch_pretrain/more_sliding'
checkdir = 'checkpoints/torch_joint/more_sliding'
logfile = 'logs/log_train_torch_more_sliding'
plot_every = 25
quadrature_size = 2
test_every = 5
eta_eval_every = 10
meannet_checkname = 'model_best'
checkname_old = 'model'
checkname_new = 'model'
require_pretrain_checkpoint = True
verify_pretrain_load = True

[pretrain]
lr = 0.0002
restore = False
n_epochs = 1000
batch_size = 2048
checkdir = 'checkpoints/torch_pretrain/more_sliding'
logfile = 'logs/log_pretrain_torch_more_sliding'
plot_every = 25
resnet = True
optimizer = 'adam'
test_every = 1
checkname = 'model'

[predict]
batch_size = 8192
num_samples = 200
output_file = 'outputs/more_sliding_posterior_samples_torch.h5'

[torch]
backend = 'gloo'
device = 'auto'
num_workers = 0
pin_memory = False
train_drop_last = True
threads = 32
