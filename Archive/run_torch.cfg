# VI + PINN config — production more_sliding spin-up ground truth
# Run from Archive/:  python pretrain_solution_torch.py run_torch.cfg
#                      python train_torch.py run_torch.cfg
#                      python predict_torch.py run_torch.cfg
#
# Spatial-η recovery recipe (fresh joint train — do NOT resume flat-η ckpts):
#   - split optimizers (PINN vs VGP) + alternating VGP-heavy updates after unfreeze
#   - longer mean_net freeze; milder η prior; slightly stronger physics
#   - optional L-BFGS for PINN after unfreeze (mean_net_optimizer_after_unfreeze)
#   - 28×28 ice-FPS inducing
# Archive the previous joint dir before submitting, e.g.
#   mv checkpoints/torch_joint/more_sliding checkpoints/torch_joint/more_sliding_flat_eta

[runtime]
dtype = 'float64'

[data]
# Production more_sliding _grid.npz (includes cfg_json with C and A).
h5file = '../outputs/spinup/production/more_sliding/SteadyState_more_sliding_10500yr_ramp4000_1refine_grid.npz'
default_u_err = 3.0
default_v_err = 3.0
default_s_err = 5.0
default_b_err = 5.0
s2y = 3600*24*365.25

[prior]
# η prior in MPa·yr (median ~12 on this case); C and A load from cfg_json at read time.
eta_init = 12.0
# Hard floor so physics cannot push η into the 0.1 collapse regime.
eta_min = 1.0
eta_max = 1.0e6
l_scale_eta = 10.0e3
std_eta = 2.0
l_scale_lambda = 10.0e3
std_lambda = 1.0
lambda_init = 0.5
# Stronger inducing KL; still mild vs the explicit log-η prior below.
kl_eta = 0.5
# λ is unused in SSA physics — keep KL off so it does not dilute the ELBO.
kl_lambda = 0.0
# 28×28 ice-FPS for spatial η capacity (was 20×20).
num_inducing_x = 28
num_inducing_y = 28
inducing_placement = 'ice_fps'
thickness_min = 1.0
speed_epsilon = 1.0
year = 3600*24*365.25
glen_exponent = 3.0
weertman_exponent = 3.0
strain_rate_min = 1.0e-5
# Fallbacks only — overridden by cfg_json (C=0.001, A=20 for more_sliding).
fluidity_A = 3.985e-13 * 3600*24*365.25 * 1.0e18
friction_C = 0.001
ssa_enforce_continuity = False
ssa_use_inferred_eta = True

[likelihood]
rx_std = 5.0
ry_std = 5.0
rH_std = 5.0
# Slightly tighter residuals after weakening η prior (was 0.1).
ssa_rx_std = 0.08
ssa_ry_std = 0.08
ssa_rh_std = 0.08
trainable_obs_variance = False

[train]
physics_approximation = 'SSA'
lr = 0.0002
# After unfreeze, keep PINN LR small so VGP can explain PDE mismatch.
mean_net_lr = 1.0e-5
# Higher VGP LR while frozen to explore spatial η.
vgp_eta_lr = 5.0e-4
vgp_lambda_lr = 1.0e-5
# Longer freeze so VGP learns spatial structure before PINN can absorb residuals.
freeze_mean_net_epochs = 800
freeze_mean_net_fraction = 0.8
freeze_from_run_start = False
# Fresh spatial-η run (inducing size / optimizer layout changed).
restore = False
restore_optimizer = False
n_epochs = 1000
batch_size = 2048
physics_batch_size = 512
data_scale = 1.0
# Slightly stronger physics after weakening η prior.
phys_scale = 3.0
state_reg_scale = 1.0
# Mild prior: anchor mean near eta_init without forcing a constant field.
eta_prior_scale = 0.2
eta_prior_std = 1.0
lr_scheduler = 'cosine'
eta_eval_every = 10
grad_eta_warn_ratio = 100.0
# Split optimizers + alternating updates (VGP-heavy after unfreeze).
optimizer = 'adam'
mean_net_optimizer = 'adam'
# Set to 'lbfgs' to fine-tune the PINN after unfreeze; VGP stays Adam.
mean_net_optimizer_after_unfreeze = 'lbfgs'
vgp_optimizer = 'adam'
vgp_steps_per_mean_step = 8
mean_net_grad_clip = 1.0
vgp_grad_clip = 5.0
lbfgs_max_iter = 20
lbfgs_history_size = 10
meannet_checkdir = 'checkpoints/torch_pretrain/more_sliding'
checkdir = 'checkpoints/torch_joint/more_sliding'
logfile = 'logs/log_train_torch_more_sliding'
plot_every = 25
quadrature_size = 2
test_every = 1
meannet_checkname = 'model_best'
checkname_old = 'model'
checkname_new = 'model'
require_pretrain_checkpoint = True
verify_pretrain_load = True

[pretrain]
lr = 0.0002
restore = False
n_epochs = 1000
batch_size = 2048
checkdir = 'checkpoints/torch_pretrain/more_sliding'
logfile = 'logs/log_pretrain_torch_more_sliding'
plot_every = 25
resnet = True
optimizer = 'adam'
test_every = 1
checkname = 'model'

[predict]
batch_size = 8192
num_samples = 200
output_file = 'outputs/more_sliding_posterior_samples_torch.h5'

[torch]
backend = 'gloo'
device = 'auto'
num_workers = 0
pin_memory = False
train_drop_last = True
# Match Slurm --cpus-per-task in vi_train_more_sliding.sbatch.
threads = 32
