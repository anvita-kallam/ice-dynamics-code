# Sequential experiment — Stage 2: VI on η with frozen pretrained PINN (more_sliding)
# Independent of joint training (run_torch.cfg / train_torch.py).
#
# Spatial-η focused recipe (PINN never updates):
#   - Matérn-3/2 or RBF via prior.kernel_type
#   - learnable length scales; optional anisotropic
#   - AdamW (+ optional NGD on variational mean)
#   - early stopping on log10_eta_r
#
# Prerequisites:
#   checkpoints/torch_pretrain/more_sliding_sequential/model_best.pt
#
#   cd Archive
#   sbatch slurm/vi_train_vi_only_more_sliding.sbatch
#   python evaluate_vi_only_posterior.py run_torch_vi_only.cfg
#   python scripts/launch_vi_only_sweep.py configs/vi_only_sweep_grid.json

[runtime]
dtype = 'float64'

[data]
h5file = '../outputs/spinup/production/more_sliding/SteadyState_more_sliding_10500yr_ramp4000_1refine_grid.npz'
default_u_err = 3.0
default_v_err = 3.0
default_s_err = 5.0
default_b_err = 5.0
s2y = 3600*24*365.25

[prior]
eta_init = 12.0
eta_min = 1.0
eta_max = 1.0e6
# Physical length scales (m) → normalized inside make_sparse_vgp.
l_scale_eta = 10.0e3
# Optional separate y length scale when anisotropic=True.
# l_scale_eta_y = 10.0e3
std_eta = 2.0
l_scale_lambda = 10.0e3
std_lambda = 1.0
lambda_init = 0.5
# KL weight on inducing-space variational posterior (expose for sweeps).
kl_eta = 0.15
kl_lambda = 0.0
# Kernel: rbf | matern12 | matern32 | matern52
kernel_type = 'matern32'
anisotropic = False
learnable_length_scale = True
# Inducing grid (ice_fps placement preferred for spatial support).
num_inducing_x = 28
num_inducing_y = 28
inducing_placement = 'ice_fps'
thickness_min = 1.0
speed_epsilon = 1.0
year = 3600*24*365.25
glen_exponent = 3.0
weertman_exponent = 3.0
strain_rate_min = 1.0e-5
fluidity_A = 3.985e-13 * 3600*24*365.25 * 1.0e18
friction_C = 0.001
ssa_enforce_continuity = False
ssa_use_inferred_eta = True

[likelihood]
rx_std = 5.0
ry_std = 5.0
rH_std = 5.0
ssa_rx_std = 0.06
ssa_ry_std = 0.06
ssa_rh_std = 0.06
trainable_obs_variance = False

[train]
physics_approximation = 'SSA'
lr = 0.0002
vgp_eta_lr = 1.0e-3
vgp_lambda_lr = 1.0e-5
# adam | adamw | adamw_ngd  (NGD on variational mean; AdamW on kernel/Cholesky)
vgp_optimizer = 'adamw'
vgp_ngd_lr = 1.0e-2
restore = False
restore_optimizer = False
n_epochs = 700
batch_size = 2048
physics_batch_size = 512
data_scale = 1.0
phys_scale = 4.0
state_reg_scale = 0.0
# Soft log-η mean prior (expose for sweeps).
eta_prior_scale = 0.08
eta_prior_std = 1.5
# cosine | plateau | exponential | none
lr_scheduler = 'cosine'
lr_scheduler_eta_min = 1.0e-5
lr_scheduler_factor = 0.5
lr_scheduler_patience = 40
lr_scheduler_gamma = 0.995
grad_eta_warn_ratio = 100.0
vgp_grad_clip = 5.0
# Early stop: log10_eta_r | log10_eta_rmse | test_total | '' to disable
early_stop_metric = 'log10_eta_r'
early_stop_patience = 80
meannet_checkdir = 'checkpoints/torch_pretrain/more_sliding_sequential'
meannet_checkname = 'model_best'
checkdir = 'checkpoints/torch_vi_only/more_sliding'
logfile = 'logs/log_train_vi_only_more_sliding'
plot_every = 25
quadrature_size = 2
test_every = 5
eta_eval_every = 10
checkname_old = 'model'
checkname_new = 'model'
require_pretrain_checkpoint = True
verify_pretrain_load = True

[pretrain]
lr = 0.0002
restore = False
n_epochs = 1000
batch_size = 2048
checkdir = 'checkpoints/torch_pretrain/more_sliding_sequential'
logfile = 'logs/log_pretrain_torch_more_sliding_sequential'
resnet = True
optimizer = 'adam'
test_every = 1
checkname = 'model'

[predict]
batch_size = 8192
num_samples = 200
output_file = 'outputs/more_sliding_vi_only_posterior_samples_torch.h5'

[torch]
backend = 'gloo'
device = 'auto'
num_workers = 0
pin_memory = False
train_drop_last = True
threads = 32
