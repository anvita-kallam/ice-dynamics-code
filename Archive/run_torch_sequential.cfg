# Sequential experiment — Stage 1: PINN pretrain only (more_sliding)
# Does not share checkpoints with the joint run (run_torch.cfg).
#
#   cd Archive
#   python pretrain_solution_torch.py run_torch_sequential.cfg
#   sbatch slurm/vi_pretrain_sequential_more_sliding.sbatch
#
# Stage 2 (VI only): run_torch_vi_only.cfg + train_vi_only_torch.py

[runtime]
dtype = 'float64'

[data]
h5file = '../outputs/spinup/production/more_sliding/SteadyState_more_sliding_10500yr_ramp4000_1refine_grid.npz'
default_u_err = 3.0
default_v_err = 3.0
default_s_err = 5.0
default_b_err = 5.0
s2y = 3600*24*365.25

[prior]
eta_init = 12.0
eta_min = 1.0
eta_max = 1.0e6
l_scale_eta = 10.0e3
std_eta = 2.0
l_scale_lambda = 10.0e3
std_lambda = 1.0
lambda_init = 0.5
kl_eta = 0.15
kl_lambda = 0.0
num_inducing_x = 24
num_inducing_y = 24
inducing_placement = 'ice_fps'
thickness_min = 1.0
speed_epsilon = 1.0
year = 3600*24*365.25
glen_exponent = 3.0
weertman_exponent = 3.0
strain_rate_min = 1.0e-5
fluidity_A = 3.985e-13 * 3600*24*365.25 * 1.0e18
friction_C = 0.001
ssa_enforce_continuity = False
ssa_use_inferred_eta = True

[likelihood]
rx_std = 5.0
ry_std = 5.0
rH_std = 5.0
ssa_rx_std = 0.06
ssa_ry_std = 0.06
ssa_rh_std = 0.06
trainable_obs_variance = False

[train]
# Unused for pretrain-only invocation; present for ParameterClass compatibility.
physics_approximation = 'SSA'
lr = 0.0002
restore = False
n_epochs = 0
batch_size = 2048
checkdir = 'checkpoints/torch_vi_only/more_sliding'
logfile = 'logs/log_train_vi_only_more_sliding'

[pretrain]
lr = 0.0002
restore = False
n_epochs = 1000
batch_size = 2048
checkdir = 'checkpoints/torch_pretrain/more_sliding_sequential'
logfile = 'logs/log_pretrain_torch_more_sliding_sequential'
plot_every = 25
resnet = True
optimizer = 'adam'
test_every = 1
checkname = 'model'

[predict]
batch_size = 8192
num_samples = 200
output_file = 'outputs/more_sliding_vi_only_posterior_samples_torch.h5'

[torch]
backend = 'gloo'
device = 'auto'
num_workers = 0
pin_memory = False
train_drop_last = True
threads = 32
