# Eta-bias suite eta_bias_v1: control_adamw
# Fresh repeat of the current optimized recipe.
# Generated from run_torch_vi_only_optimized.cfg; do not edit by hand.

# Optimized sequential Stage 2: VI on eta with the sequential PINN frozen.
# This run is isolated from both the original VI-only and joint experiments.

[runtime]
dtype = 'float64'

[data]
h5file = '../outputs/spinup/production/more_sliding/SteadyState_more_sliding_10500yr_ramp4000_1refine_grid.npz'
default_u_err = 3.0
default_v_err = 3.0
default_s_err = 5.0
default_b_err = 5.0
s2y = 3600*24*365.25

[prior]
eta_init = 12.0
eta_min = 1.0
eta_max = 1.0e6
l_scale_eta = 10.0e3
std_eta = 2.0
l_scale_lambda = 10.0e3
std_lambda = 1.0
lambda_init = 0.5
kl_eta = 0.15
kl_lambda = 0.0
kernel_type = 'matern32'
anisotropic = False
learnable_length_scale = True
num_inducing_x = 28
num_inducing_y = 28
inducing_placement = 'ice_fps'
thickness_min = 1.0
speed_epsilon = 1.0
year = 3600*24*365.25
glen_exponent = 3.0
weertman_exponent = 3.0
strain_rate_min = 1.0e-5
fluidity_A = 3.985e-13 * 3600*24*365.25 * 1.0e18
friction_C = 0.001
ssa_enforce_continuity = False
ssa_use_inferred_eta = True

[likelihood]
rx_std = 5.0
ry_std = 5.0
rH_std = 5.0
ssa_rx_std = 0.06
ssa_ry_std = 0.06
ssa_rh_std = 0.06
trainable_obs_variance = False

[train]
physics_approximation = 'SSA'
lr = 0.0002
# The first run peaked near epoch 20 at 1e-3. A 3x lower VGP rate gives
# spatial structure time to converge before the cosine decay.
vgp_eta_lr = 3.0e-4
vgp_lambda_lr = 1.0e-5
eta_shift_lr = 3.0e-4
vgp_optimizer = 'adamw'
vgp_ngd_lr = 1.0e-2
restore = False
restore_optimizer = False
# About 11 hours at the measured 3.7 h / 100 epochs; early stopping may finish sooner.
n_epochs = 300
batch_size = 2048
physics_batch_size = 512
data_scale = 1.0
phys_scale = 4.0
state_reg_scale = 0.0
eta_prior_scale = 0.08
eta_prior_std = 1.5
lr_scheduler = 'cosine'
lr_scheduler_eta_min = 1.0e-5
lr_scheduler_factor = 0.5
lr_scheduler_patience = 40
lr_scheduler_gamma = 0.995
grad_eta_warn_ratio = 100.0
vgp_grad_clip = 5.0
# Patience is counted only on fresh eta evaluations (20 x 5 = 100 epochs).
early_stop_metric = 'log10_eta_r'
early_stop_patience = 20
early_stop_min_delta = 1.0e-4
meannet_checkdir = 'checkpoints/torch_pretrain/more_sliding_sequential'
meannet_checkname = 'model_best'
checkdir = 'checkpoints/torch_vi_only/eta_bias_suite/eta_bias_v1/control_adamw'
logfile = 'logs/log_vi_only_eta_bias_eta_bias_v1_control_adamw'
plot_every = 25
quadrature_size = 2
test_every = 5
eta_eval_every = 5
checkname_old = 'model'
checkname_new = 'model'
checkname_best = 'model_best'
require_pretrain_checkpoint = True
verify_pretrain_load = True

evaldir = 'outputs/vi_only_eta_bias_suite/eta_bias_v1/control_adamw'
seed = 20260721
[pretrain]
lr = 0.0002
restore = False
n_epochs = 1000
batch_size = 2048
checkdir = 'checkpoints/torch_pretrain/more_sliding_sequential'
logfile = 'logs/log_pretrain_torch_more_sliding_sequential'
resnet = True
optimizer = 'adam'
test_every = 1
checkname = 'model'

[predict]
batch_size = 8192
num_samples = 200
output_file = 'outputs/vi_only_eta_bias_suite/eta_bias_v1/control_adamw/posterior_samples.h5'

[torch]
backend = 'gloo'
device = 'auto'
num_workers = 0
pin_memory = False
train_drop_last = True
threads = 32
