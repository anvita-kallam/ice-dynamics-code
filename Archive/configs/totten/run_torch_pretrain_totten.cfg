# Totten Stage 1 — shared PINN pretrain (observation loss only).
# Used by both basal-sliding VI end-members (no_sliding / max_sliding).
#
#   cd Archive
#   python pretrain_solution_torch.py configs/totten/run_torch_pretrain_totten.cfg
#
# Stage 2: run_torch_vi_only_totten_{no,max}_sliding.cfg

[runtime]
dtype = 'float64'

[data]
h5file = '../data/real/totten/totten_archive_vi_2022.npz'
default_u_err = 3.0
default_v_err = 3.0
default_s_err = 5.0
default_b_err = 5.0
s2y = 3600*24*365.25

[prior]
eta_init = 15.0
eta_min = 1.0
eta_max = 1.0e6
l_scale_eta = 10.0e3
std_eta = 2.0
l_scale_lambda = 10.0e3
std_lambda = 1.0
lambda_init = 0.5
kl_eta = 0.15
kl_lambda = 0.0
num_inducing_x = 28
num_inducing_y = 28
inducing_placement = 'ice_fps'
thickness_min = 1.0
speed_epsilon = 1.0
year = 3600*24*365.25
glen_exponent = 3.0
weertman_exponent = 3.0
strain_rate_min = 1.0e-5
fluidity_A = 3.985e-13 * 3600*24*365.25 * 1.0e18
# Placeholder only for ParameterClass; sliding is set in the VI-only cfgs.
friction_C = 0.001
ssa_enforce_continuity = False
ssa_use_inferred_eta = True

[likelihood]
rx_std = 5.0
ry_std = 5.0
rH_std = 5.0
ssa_rx_std = 0.06
ssa_ry_std = 0.06
ssa_rh_std = 0.06
trainable_obs_variance = False

[train]
# Unused for pretrain-only invocation; present for ParameterClass compatibility.
physics_approximation = 'SSA'
lr = 0.0002
restore = False
n_epochs = 0
batch_size = 2048
checkdir = 'checkpoints/torch_vi_only/totten'
logfile = 'logs/log_train_vi_only_totten'

[pretrain]
lr = 0.0002
restore = False
n_epochs = 1000
batch_size = 2048
checkdir = 'checkpoints/torch_pretrain/totten'
logfile = 'logs/log_pretrain_torch_totten'
plot_every = 25
resnet = True
optimizer = 'adam'
test_every = 1
checkname = 'model'

[predict]
batch_size = 8192
num_samples = 200
output_file = 'outputs/totten/posterior_samples_placeholder.h5'

[torch]
backend = 'gloo'
device = 'auto'
num_workers = 0
pin_memory = False
train_drop_last = True
threads = 32
