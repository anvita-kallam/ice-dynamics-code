# Totten Stage 2 — VI-only, no basal sliding (friction_C = 100).
# Prerequisites:
#   checkpoints/torch_pretrain/totten/model_best.pt
#
#   cd Archive
#   python train_vi_only_torch.py configs/totten/run_torch_vi_only_totten_no_sliding.cfg
#
# No viscosity truth: eta_eval_every = 0, early stop disabled.

[runtime]
dtype = 'float64'

[data]
h5file = '../data/real/totten/totten_archive_vi_2022.npz'
default_u_err = 3.0
default_v_err = 3.0
default_s_err = 5.0
default_b_err = 5.0
s2y = 3600*24*365.25

[prior]
eta_init = 15.0
eta_min = 1.0
eta_max = 1.0e6
l_scale_eta = 10.0e3
std_eta = 2.0
l_scale_lambda = 10.0e3
std_lambda = 1.0
lambda_init = 0.5
kl_eta = 0.15
kl_lambda = 0.0
kernel_type = 'matern32'
anisotropic = False
learnable_length_scale = True
num_inducing_x = 28
num_inducing_y = 28
inducing_placement = 'ice_fps'
thickness_min = 1.0
speed_epsilon = 1.0
year = 3600*24*365.25
glen_exponent = 3.0
weertman_exponent = 3.0
strain_rate_min = 1.0e-5
fluidity_A = 3.985e-13 * 3600*24*365.25 * 1.0e18
friction_C = 100.0
ssa_enforce_continuity = False
ssa_use_inferred_eta = True

[likelihood]
rx_std = 5.0
ry_std = 5.0
rH_std = 5.0
ssa_rx_std = 0.06
ssa_ry_std = 0.06
ssa_rh_std = 0.06
trainable_obs_variance = False

[train]
physics_approximation = 'SSA'
lr = 0.0002
vgp_eta_lr = 3.0e-4
vgp_lambda_lr = 1.0e-5
eta_shift_lr = 3.0e-4
vgp_optimizer = 'adamw'
vgp_ngd_lr = 1.0e-2
restore = False
restore_optimizer = False
n_epochs = 300
batch_size = 2048
physics_batch_size = 512
data_scale = 1.0
phys_scale = 4.0
state_reg_scale = 0.0
eta_prior_scale = 0.08
eta_prior_std = 1.5
lr_scheduler = 'cosine'
lr_scheduler_eta_min = 1.0e-5
lr_scheduler_factor = 0.5
lr_scheduler_patience = 40
lr_scheduler_gamma = 0.995
grad_eta_warn_ratio = 100.0
vgp_grad_clip = 5.0
# No η truth on Totten — disable early stop (patience=0).
early_stop_patience = 0
early_stop_min_delta = 1.0e-4
meannet_checkdir = 'checkpoints/torch_pretrain/totten'
meannet_checkname = 'model_best'
checkdir = 'checkpoints/torch_vi_only/totten/no_sliding'
logfile = 'logs/log_vi_only_totten_no_sliding'
plot_every = 25
quadrature_size = 2
test_every = 5
eta_eval_every = 0
checkname_old = 'model'
checkname_new = 'model'
checkname_best = 'model_best'
require_pretrain_checkpoint = True
verify_pretrain_load = True

evaldir = 'outputs/totten/no_sliding'
seed = 20260723

[pretrain]
lr = 0.0002
restore = False
n_epochs = 1000
batch_size = 2048
checkdir = 'checkpoints/torch_pretrain/totten'
logfile = 'logs/log_pretrain_torch_totten'
resnet = True
optimizer = 'adam'
test_every = 1
checkname = 'model'

[predict]
batch_size = 8192
num_samples = 200
output_file = 'outputs/totten/no_sliding/posterior_samples.h5'

[torch]
backend = 'gloo'
device = 'auto'
num_workers = 0
pin_memory = False
train_drop_last = True
threads = 32
